<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Toolkit, Postman - Задание 3</title>
    <script type="importmap">
        { "imports": { "axios": "./node_modules/axios/dist/esm/axios.js" } }
    </script>
</head>
<body>
    <button id="btn">Показать мой IP</button>
    <pre id="result"></pre>
    <script type="module">
        import axios from 'axios';
        document.getElementById('btn').onclick = async () => {
            const { data } = await axios.get('https://json.geoiplookup.io/');
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        };
    </script>
</body>
</html>
